---
name: is_static
type: bool
default: false
actions:
  'true':
    target:
      definitions:
      - LIBTQ_LIB_STATIC=1
      - LIBTQ_LIB_SHARED=0
      linkOptions:
      - "[[ @off(@platform == 'win', '-static') ]]"
  'false':
    target:
      definitions:
      - LIBTQ_LIB_STATIC=0
      - LIBTQ_LIB_SHARED=1